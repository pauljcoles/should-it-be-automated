<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>should-it-be-automated</title>
    <script>
      // GitHub Pages SPA redirect — encode the path into the query string so
      // index.html can restore it before React Router takes over.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
